<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visa Colombia — Market Intelligence</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #F8FAFC;
         display: flex; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; }
  .card { background: white; border-radius: 12px; padding: 48px 40px;
          text-align: center; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: 2px;
          color: #94A3B8; margin-bottom: 24px; }
  h1 { font-size: 22px; font-weight: 700; color: #1A1F71; margin: 0 0 8px; }
  p  { font-size: 14px; color: #64748B; margin: 0; line-height: 1.6; }
  .dot { display: inline-block; width: 8px; height: 8px; background: #F59E0B;
         border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>
<div class="card">
  <div class="logo">VISA COLOMBIA · MARKET INTELLIGENCE</div>
  <h1>Dashboard en preparación</h1>
  <p><span class="dot"></span>El reporte interactivo estará disponible tras el próximo run del workflow.</p>
</div>
</body>
</html>
