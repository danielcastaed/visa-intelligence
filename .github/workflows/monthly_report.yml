name: Monthly Market Intelligence Report

on:
  schedule:
    - cron: "0 13 15 * *"   # día 15, 8am Colombia
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (genera sin enviar email)"
        required: false
        default: "false"

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas numpy plotly nbconvert jupyter-client ipykernel
          python -m ipykernel install --user --name python3

      - name: Execute notebook (genera sfc_dashboard.html)
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute SFC_Analytics.ipynb \
            --output SFC_Analytics_executed.ipynb \
            --ExecutePreprocessor.timeout=600 \
            --ExecutePreprocessor.kernel_name=python3
          echo "Notebook ejecutado"
          ls -lh *.html || echo "Sin HTML generado"

      - name: Generate email report
        run: python report/generate_report.py report/output_report.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: market-report-${{ github.run_id }}
          path: |
            report/output_report.html
            sfc_dashboard.html
          retention-days: 90

      - name: Send email
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO:      ${{ secrets.REPORT_TO }}
        run: python report/send_email.py report/output_report.html
