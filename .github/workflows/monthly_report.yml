name: Monthly Market Intelligence Report

on:
  schedule:
    - cron: "0 13 25-31 * 2"  # Martes de la última semana del mes, 8am Colombia (UTC-5)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (genera sin enviar email)"
        required: false
        default: "false"

# Permissions needed for GitHub Pages deploy
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas numpy nbconvert jupyter-client ipykernel plotly
          python -m ipykernel install --user --name python3

      - name: Execute notebook
        run: |
          NOTEBOOK=$(find . -name "SFC_Analytics.ipynb" | head -1)
          if [ -z "$NOTEBOOK" ]; then
            echo "ERROR: SFC_Analytics.ipynb no encontrado"
            exit 1
          fi
          echo "Notebook: $NOTEBOOK"
          NOTEBOOK_DIR=$(dirname "$NOTEBOOK")
          NOTEBOOK_FILE=$(basename "$NOTEBOOK")
          cd "$NOTEBOOK_DIR"
          python -m nbconvert \
            --to notebook \
            --execute "$NOTEBOOK_FILE" \
            --output "${NOTEBOOK_FILE%.ipynb}_executed.ipynb" \
            --ExecutePreprocessor.timeout=1200 \
            --ExecutePreprocessor.kernel_name=python3
          echo "Notebook ejecutado ✅"
          ls -lh sfc_dashboard.html 2>/dev/null || echo "Aviso: dashboard no generado"
          [ "$NOTEBOOK_DIR" != "." ] && cp sfc_dashboard.html "$GITHUB_WORKSPACE/" 2>/dev/null || true

      - name: Generate email report
        run: python report/generate_report.py report/output_report.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: market-report-${{ github.run_id }}
          path: |
            report/output_report.html
            sfc_dashboard.html
          retention-days: 90
          if-no-files-found: warn

      - name: Deploy dashboard to GitHub Pages
        run: |
          # Prepare docs/ folder for Pages
          mkdir -p docs
          cp sfc_dashboard.html docs/index.html
          touch docs/.nojekyll  # skip Jekyll processing

          # Commit and push to main
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "chore: update dashboard $(date +'%Y-%m')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send email
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO:      ${{ secrets.REPORT_TO }}
        run: python report/send_email.py report/output_report.html
