name: Monthly Market Intelligence Report

on:
  schedule:
    - cron: "0 13 15 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (genera sin enviar email)"
        required: false
        default: "false"

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas numpy plotly nbconvert jupyter-client ipykernel
          python -m ipykernel install --user --name python3

      - name: Find and execute notebook
        run: |
          # Buscar el notebook en cualquier ubicación del repo
          NOTEBOOK=$(find . -name "SFC_Analytics.ipynb" | head -1)
          if [ -z "$NOTEBOOK" ]; then
            echo "ERROR: SFC_Analytics.ipynb no encontrado"
            find . -name "*.ipynb" | head -10
            exit 1
          fi
          echo "Notebook encontrado: $NOTEBOOK"
          NOTEBOOK_DIR=$(dirname "$NOTEBOOK")
          NOTEBOOK_FILE=$(basename "$NOTEBOOK")
          cd "$NOTEBOOK_DIR"
          python -m nbconvert \
            --to notebook \
            --execute "$NOTEBOOK_FILE" \
            --output "${NOTEBOOK_FILE%.ipynb}_executed.ipynb" \
            --ExecutePreprocessor.timeout=600 \
            --ExecutePreprocessor.kernel_name=python3
          echo "Notebook ejecutado exitosamente"
          ls -lh *.html 2>/dev/null || echo "Sin HTML en directorio del notebook"
          # Mover el dashboard a la raíz si está en subcarpeta
          if [ "$NOTEBOOK_DIR" != "." ]; then
            cp sfc_dashboard.html "$GITHUB_WORKSPACE/" 2>/dev/null || true
          fi

      - name: Verify dashboard was generated
        run: |
          ls -lh *.html 2>/dev/null || echo "Sin HTML en raíz"
          find . -name "sfc_dashboard.html" | head -5

      - name: Generate email report
        run: python report/generate_report.py report/output_report.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: market-report-${{ github.run_id }}
          path: |
            report/output_report.html
            sfc_dashboard.html
          retention-days: 90

      - name: Send email
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO:      ${{ secrets.REPORT_TO }}
        run: python report/send_email.py report/output_report.html
